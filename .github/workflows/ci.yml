name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"

jobs:
  # ═══════════════════════════════════════════════════════════════
  # BACKEND
  # ═══════════════════════════════════════════════════════════════

  lint-backend:
    name: "Backend: Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff
      - name: Ruff check
        continue-on-error: true
        run: ruff check app/ tests/ --output-format=github
      - name: Ruff format check
        continue-on-error: true
        run: ruff format --check app/ tests/

  typecheck-backend:
    name: "Backend: Typecheck"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install mypy
      - name: MyPy
        continue-on-error: true
        run: mypy app/ --ignore-missing-imports --no-strict-optional --check-untyped-defs

  test-backend:
    name: "Backend: Test"
    runs-on: ubuntu-latest
    needs: [lint-backend]
    continue-on-error: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: careeros
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U postgres
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/careeros
          QDRANT_URL: http://localhost:6333
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-for-ci
          DEBUG: "true"
        run: pytest tests/ -q --timeout=120 -x --cov=app --cov-report=term --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: success()
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  security-backend:
    name: "Backend: Security"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install safety bandit
      - name: Check dependencies for vulnerabilities
        run: safety check -r requirements.txt --full-report || true
      - name: Run bandit security linter
        run: bandit -r app/ -c pyproject.toml || true

  # ═══════════════════════════════════════════════════════════════
  # FRONTEND
  # ═══════════════════════════════════════════════════════════════

  lint-frontend:
    name: "Frontend: Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck-frontend:
    name: "Frontend: Typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  test-frontend:
    name: "Frontend: Test"
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Run tests
        continue-on-error: true
        run: npm test -- --run
      - name: Build
        run: npm run build

  # ═══════════════════════════════════════════════════════════════
  # SUMMARY
  # ═══════════════════════════════════════════════════════════════

  ci-complete:
    name: "CI Complete"
    if: always()
    needs: [lint-backend, typecheck-backend, test-backend, security-backend, lint-frontend, typecheck-frontend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          echo "Backend Lint: ${{ needs.lint-backend.result }}"
          echo "Backend Typecheck: ${{ needs.typecheck-backend.result }}"
          echo "Backend Test: ${{ needs.test-backend.result }}"
          echo "Backend Security: ${{ needs.security-backend.result }}"
          echo "Frontend Lint: ${{ needs.lint-frontend.result }}"
          echo "Frontend Typecheck: ${{ needs.typecheck-frontend.result }}"
          echo "Frontend Test: ${{ needs.test-frontend.result }}"
          echo "All jobs completed (non-blocking checks marked continue-on-error)"
          echo "CI passed!"
