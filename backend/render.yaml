services:
  - type: web
    name: agentforge-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DATABASE_URL
        fromDatabase:
          name: agentforge-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: agentforge-redis
          property: connectionString
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: "HS256"
      - key: CORS_ORIGINS
        value: "http://localhost:5173"
      - key: DEBUG
        value: "false"

databases:
  - name: agentforge-db
    plan: free
    databaseName: agentforge
  - name: agentforge-redis
    plan: free
